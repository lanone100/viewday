<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時光維度 - 全功能天數計算機</title>
    <style>
        :root {
            --primary: #4834d4;
            --secondary: #686de0;
            --accent: #eb4d4b;
            --bg: #f0f2f5;
            --card: #ffffff;
        }

        body {
            font-family: 'PingFang TC', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        label {
            font-size: 0.85rem;
            color: #636e72;
            margin-bottom: 5px;
            display: block;
            font-weight: bold;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .main-display {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            padding: 30px;
            color: white;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(72, 52, 212, 0.2);
        }

        .main-value {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
        }

        .main-unit { font-size: 1.2rem; margin-left: 5px; }

        /* 多維度網格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            border-left: 5px solid var(--secondary);
            transition: transform 0.2s;
        }

        .stat-box:hover { transform: translateY(-3px); }

        .stat-label { font-size: 0.8rem; color: #b2bec3; margin-bottom: 5px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: #2d3436; overflow-wrap: break-word; }

        @media (min-width: 600px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>時光維度計算機</h2>

    <div class="input-section">
        <div>
            <label>起始日期</label>
            <input type="date" id="date-start">
        </div>
        <div>
            <label>目標日期</label>
            <input type="date" id="date-end">
        </div>
    </div>

    <div class="main-display">
        <div style="font-size: 0.9rem; opacity: 0.8;">相隔總天數</div>
        <div class="main-value" id="res-days">0<span class="main-unit">天</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">週數 (Weeks)</div>
            <div class="stat-value" id="res-weeks">0</div>
        </div>
        <div class="stat-box" style="border-left-color: #00cec9;">
            <div class="stat-label">月數 (Months)</div>
            <div class="stat-value" id="res-months">0</div>
        </div>
        <div class="stat-box" style="border-left-color: #fdcb6e;">
            <div class="stat-label">年數 (Years)</div>
            <div class="stat-value" id="res-years">0</div>
        </div>
        <div class="stat-box" style="border-left-color: #a29bfe;">
            <div class="stat-label">小時數 (Hours)</div>
            <div class="stat-value" id="res-hours">0</div>
        </div>
        <div class="stat-box" style="border-left-color: #fab1a0;">
            <div class="stat-label">分鐘數 (Minutes)</div>
            <div class="stat-value" id="res-mins">0</div>
        </div>
        <div class="stat-box" style="border-left-color: #ff7675;">
            <div class="stat-label">秒數 (Seconds)</div>
            <div class="stat-value" id="res-secs">0</div>
        </div>
    </div>
</div>

<script>
    const d1 = document.getElementById('date-start');
    const d2 = document.getElementById('date-end');

    // 初始化日期
    const now = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(now.getDate() + 1);
    
    d1.value = now.toISOString().split('T')[0];
    d2.value = tomorrow.toISOString().split('T')[0];

    function updateAll() {
        const start = new Date(d1.value);
        const end = new Date(d2.value);
        
        if (isNaN(start) || isNaN(end)) return;

        const diffMs = Math.abs(end - start);
        const diffDays = diffMs / (1000 * 60 * 60 * 24);

        // 格式化數字輸出
        const fmt = (num) => num.toLocaleString(undefined, {maximumFractionDigits: 2});
        const fmtInt = (num) => Math.floor(num).toLocaleString();

        document.getElementById('res-days').innerHTML = `${Math.floor(diffDays)}<span class="main-unit">天</span>`;
        document.getElementById('res-weeks').innerText = fmt(diffDays / 7);
        document.getElementById('res-months').innerText = fmt(diffDays / 30.4375);
        document.getElementById('res-years').innerText = fmt(diffDays / 365.25);
        document.getElementById('res-hours').innerText = fmtInt(diffDays * 24);
        document.getElementById('res-mins').innerText = fmtInt(diffDays * 1440);
        document.getElementById('res-secs').innerText = fmtInt(diffDays * 86400);
    }

    d1.addEventListener('change', updateAll);
    d2.addEventListener('change', updateAll);
    updateAll(); // 初始計算
</script>

</body>
</html>

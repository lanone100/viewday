<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeMaster Pro - 專業工期計算機</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --primary: #4a69bd;
            --workday: #218c74;
            --card: #ffffff;
            --text: #2d3436;
        }

        body {
            font-family: 'PingFang TC', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            padding-bottom: 20px;
        }

        .tabs { display: flex; background: #e2e8f0; padding: 5px; gap: 5px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: none;
            cursor: pointer; font-weight: bold; border-radius: 12px;
            color: #64748b; transition: 0.3s;
        }
        .tab-btn.active { background: var(--card); color: var(--primary); }

        .content-panel { display: none; padding: 25px; animation: fadeIn 0.3s ease; }
        .content-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-row { margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #475569; font-weight: 600; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid #f1f5f9;
            border-radius: 12px; font-size: 1rem; box-sizing: border-box;
        }

        /* 工作日勾選區 */
        .workday-selector {
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .check-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .check-item {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .check-item input { width: auto; margin-right: 5px; }

        /* 結果區 */
        .result-box {
            padding: 20px; border-radius: 18px; text-align: center;
            margin-top: 10px; border: 2px solid #e2e8f0;
        }
        .work-res {
            background: linear-gradient(135deg, #218c74, #1b6d5a);
            color: white; border: none; margin-top: 15px;
        }
        .big-text { font-size: 2.2rem; font-weight: 800; display: block; }
        .unit { font-size: 1rem; font-weight: normal; margin-left: 5px; }

        @media (max-width: 480px) {
            .check-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'diff')">相隔天數/工期</button>
        <button class="tab-btn" onclick="openTab(event, 'calc')">日期推算</button>
    </div>

    <div id="diff" class="content-panel active">
        <div class="grid-2">
            <div class="form-row">
                <label>開始日期</label>
                <input type="date" id="d-start" onchange="runAllCalc()">
            </div>
            <div class="form-row">
                <label>結束日期</label>
                <input type="date" id="d-end" onchange="runAllCalc()">
            </div>
        </div>

        <div class="workday-selector">
            <label>設定工作日 (勾選後計算工作天)</label>
            <div class="check-grid">
                <label class="check-item"><input type="checkbox" value="1" checked onchange="runAllCalc()">週一</label>
                <label class="check-item"><input type="checkbox" value="2" checked onchange="runAllCalc()">週二</label>
                <label class="check-item"><input type="checkbox" value="3" checked onchange="runAllCalc()">週三</label>
                <label class="check-item"><input type="checkbox" value="4" checked onchange="runAllCalc()">週四</label>
                <label class="check-item"><input type="checkbox" value="5" checked onchange="runAllCalc()">週五</label>
                <label class="check-item"><input type="checkbox" value="6" onchange="runAllCalc()">週六</label>
                <label class="check-item"><input type="checkbox" value="0" onchange="runAllCalc()">週日</label>
            </div>
        </div>

        <div class="result-box">
            <span style="color: #64748b;">總曆天數 (含假日)</span>
            <span class="big-text" id="total-days" style="color: var(--primary);">0<span class="unit">天</span></span>
        </div>

        <div class="result-box work-res">
            <span style="opacity: 0.9;">計算工作天數</span>
            <span class="big-text" id="work-days">0<span class="unit">工作天</span></span>
            <div style="font-size: 0.8rem; margin-top: 5px; opacity: 0.8;">(僅包含勾選的星期)</div>
        </div>
    </div>

    <div id="calc" class="content-panel">
        <div class="form-row">
            <label>基準日期</label>
            <input type="date" id="c-base" onchange="calcTargetDate()">
        </div>
        <div class="grid-2">
            <div class="form-row">
                <label>操作</label>
                <select id="c-op" onchange="calcTargetDate()">
                    <option value="add">加上 (+)</option>
                    <option value="sub">減去 (-)</option>
                </select>
            </div>
            <div class="form-row">
                <label>天數</label>
                <input type="number" id="c-days" value="10" oninput="calcTargetDate()">
            </div>
        </div>
        <div class="result-box" style="border-color: var(--primary);">
            <div style="font-size: 0.9rem; color: #747d8c;">推算結果</div>
            <div class="big-text" id="calc-res" style="color: var(--primary); font-size: 1.8rem;">-</div>
        </div>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("content-panel");
        for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        let tabs = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // 初始化日期
    const today = new Date();
    document.getElementById('d-start').valueAsDate = today;
    document.getElementById('d-end').valueAsDate = today;
    document.getElementById('c-base').valueAsDate = today;

    function runAllCalc() {
        const startStr = document.getElementById('d-start').value;
        const endStr = document.getElementById('d-end').value;
        if (!startStr || !endStr) return;

        let start = new Date(startStr);
        let end = new Date(endStr);
        
        // 確保 start 小於 end，若反過來則交換
        let reverse = false;
        if (start > end) {
            [start, end] = [end, start];
            reverse = true;
        }

        // 1. 計算總曆天數
        const diffTime = Math.abs(end - start);
        const totalDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById('total-days').innerHTML = `${totalDays}<span class="unit">天</span>`;

        // 2. 計算工作天 (需考慮勾選的星期)
        const checkboxes = document.querySelectorAll('.check-grid input:checked');
        const allowedDays = Array.from(checkboxes).map(cb => parseInt(cb.value));
        
        let workDays = 0;
        let current = new Date(start);
        
        // 迴圈計算範圍內的每一天 (包含首尾)
        // 注意：這裡採用「包含首天，直到當天結束」的工期邏輯
        while (current <= end) {
            if (allowedDays.includes(current.getDay())) {
                workDays++;
            }
            current.setDate(current.getDate() + 1);
        }

        // 如果起始與結束是同一天，且是工作日，則為1天；若計算間隔則需視需求調整
        // 這裡採用的是「包含當天」的工期計算模式
        document.getElementById('work-days').innerHTML = `${workDays}<span class="unit">工作天</span>`;
    }

    function calcTargetDate() {
        const base = new Date(document.getElementById('c-base').value);
        const op = document.getElementById('c-op').value;
        const days = parseInt(document.getElementById('c-days').value) || 0;
        const result = new Date(base);
        result.setDate(base.getDate() + (op === 'add' ? days : -days));
        const opt = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('calc-res').innerText = result.toLocaleDateString('zh-TW', opt);
    }

    // 初始執行
    runAllCalc();
    calcTargetDate();
</script>

</body>
</html>

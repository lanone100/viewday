<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeMaster Pro 2.0 - 響應式計算方案</title>
    <style>
        :root {
            --primary: #4a69bd;
            --secondary: #218c74;
            --bg: #f4f7f6;
            --card: #ffffff;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* 響應式 Tabs */
        .tabs { display: flex; background: #edf2f7; padding: 5px; }
        .tab-btn {
            flex: 1; padding: 12px 5px; border: none; background: none;
            cursor: pointer; font-weight: 600; border-radius: 10px;
            color: #718096; transition: 0.2s; font-size: 0.95rem;
        }
        .tab-btn.active { background: var(--card); color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .panel { display: none; padding: 20px; }
        .panel.active { display: block; }

        /* 表格與表單適配 */
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        label { font-size: 0.85rem; color: #4a5568; margin-bottom: 5px; display: block; font-weight: bold; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 1rem; appearance: none;
        }
        input:focus { border-color: var(--primary); outline: none; }

        /* 勾選框網格修復 */
        .workday-box {
            background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .check-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
        }
        .check-item {
            display: flex; align-items: center; font-size: 0.85rem;
            cursor: pointer; background: white; padding: 5px 8px;
            border-radius: 6px; border: 1px solid var(--border);
        }
        .check-item input { width: auto; margin-right: 5px; }

        /* 結果顯示區 */
        .res-display {
            text-align: center; padding: 20px; border-radius: 15px;
            background: #f1f5f9; margin-bottom: 10px;
        }
        .big-val { font-size: 2.5rem; font-weight: 800; color: var(--primary); display: block; word-break: break-all; }
        .work-val { background: var(--secondary); color: white; margin-top: 10px; }
        .work-val .big-val { color: white; }

        /* 手機端微調 */
        @media (max-width: 400px) {
            .row { grid-template-columns: 1fr; }
            .big-val { font-size: 2rem; }
            .tab-btn { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'p1')">天數計算</button>
        <button class="tab-btn" onclick="switchTab(event, 'p2')">日期推算</button>
    </nav>

    <div id="p1" class="panel active">
        <div class="row">
            <div>
                <label>開始日期</label>
                <input type="date" id="start-d" onchange="calculate()">
            </div>
            <div>
                <label>結束日期</label>
                <input type="date" id="end-d" onchange="calculate()">
            </div>
        </div>

        <div class="workday-box">
            <label>自訂工作日 (勾選包含項目)</label>
            <div class="check-grid">
                <label class="check-item"><input type="checkbox" value="1" checked onchange="calculate()">一</label>
                <label class="check-item"><input type="checkbox" value="2" checked onchange="calculate()">二</label>
                <label class="check-item"><input type="checkbox" value="3" checked onchange="calculate()">三</label>
                <label class="check-item"><input type="checkbox" value="4" checked onchange="calculate()">四</label>
                <label class="check-item"><input type="checkbox" value="5" checked onchange="calculate()">五</label>
                <label class="check-item"><input type="checkbox" value="6" onchange="calculate()">六</label>
                <label class="check-item"><input type="checkbox" value="0" onchange="calculate()">日</label>
            </div>
        </div>

        <div class="res-display">
            <small>總曆天數</small>
            <span class="big-val" id="res-total">0 天</span>
        </div>
        <div class="res-display work-val">
            <small>合計工作天</small>
            <span class="big-val" id="res-work">0 天</span>
        </div>
    </div>

    <div id="p2" class="panel">
        <div class="input-group">
            <div>
                <label>基準日期</label>
                <input type="date" id="base-d" onchange="calcDate()">
            </div>
            <div class="row">
                <div>
                    <label>計算模式</label>
                    <select id="mode" onchange="calcDate()">
                        <option value="add">加上 (+)</option>
                        <option value="sub">減去 (-)</option>
                    </select>
                </div>
                <div>
                    <label>天數</label>
                    <input type="number" id="num-d" value="30" oninput="calcDate()">
                </div>
            </div>
        </div>
        <div class="res-display" style="border: 2px solid var(--primary); background: white;">
            <small>推算日期為</small>
            <span class="big-val" id="res-date" style="font-size: 1.5rem;">-</span>
        </div>
    </div>
</div>

<script>
    function switchTab(e, id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    // 初始化日期字串 (避免時區偏移)
    const getToday = () => new Date().toISOString().split('T')[0];
    document.getElementById('start-d').value = getToday();
    document.getElementById('end-d').value = getToday();
    document.getElementById('base-d').value = getToday();

    function calculate() {
        const sVal = document.getElementById('start-d').value;
        const eVal = document.getElementById('end-d').value;
        if(!sVal || !eVal) return;

        let s = new Date(sVal);
        let e = new Date(eVal);
        const isReverse = s > e;
        if(isReverse) [s, e] = [e, s];

        // 總天數
        const diff = Math.floor((e - s) / 86400000);
        document.getElementById('res-total').innerText = (diff + 1) + " 天";

        // 工作天計算 (優化算法)
        const checks = Array.from(document.querySelectorAll('.check-grid input:checked')).map(i => parseInt(i.value));
        let workCount = 0;
        let cur = new Date(s);
        
        // 安全機制：限制最大計算 36500 天 (約100年)
        let safety = 0;
        while(cur <= e && safety < 36500) {
            if(checks.includes(cur.getDay())) workCount++;
            cur.setDate(cur.getDate() + 1);
            safety++;
        }
        document.getElementById('res-work').innerText = workCount + " 天";
    }

    function calcDate() {
        const base = new Date(document.getElementById('base-d').value);
        const mode = document.getElementById('mode').value;
        const num = parseInt(document.getElementById('num-d').value) || 0;
        
        if(isNaN(base.getTime())) return;
        
        const res = new Date(base);
        res.setDate(base.getDate() + (mode === 'add' ? num : -num));
        
        const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
        document.getElementById('res-date').innerText = res.toLocaleDateString('zh-TW', options);
    }

    // 初始載入
    calculate();
    calcDate();
</script>

</body>
</html>

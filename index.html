}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; min-width: 0; }
html, body { width: 100%; max-width: 100%; overflow-x: hidden; margin: 0; }

body {
font-family: ‘Sora’, sans-serif;
background: var(–bg-deep);
background-image:
radial-gradient(ellipse 80% 50% at 50% -20%, rgba(10,186,181,0.25) 0%, transparent 60%),
radial-gradient(ellipse 60% 40% at 80% 110%, rgba(7,122,118,0.15) 0%, transparent 55%);
padding: 14px;
display: flex; justify-content: center; align-items: flex-start;
min-height: 100vh;
}

.container {
width: 100%; max-width: 560px;
border-radius: 24px; overflow: hidden;
border: 1px solid var(–border-dim);
box-shadow: 0 0 0 1px rgba(10,186,181,0.2), 0 24px 60px rgba(7,122,118,0.2), 0 4px 16px rgba(10,186,181,0.1);
}

/* ── Header ── */
.header {
background: var(–grad-header);
padding: 18px 20px 0;
border-bottom: 1px solid var(–border-dim);
}
.header-title { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.header-icon {
width: 36px; height: 36px; border-radius: 10px;
background: var(–grad-tab);
display: flex; align-items: center; justify-content: center;
font-size: 1.1rem; box-shadow: 0 4px 12px rgba(10,186,181,0.45);
flex-shrink: 0;
}
.header-text h1 { font-size: 1rem; font-weight: 800; color: var(–text-bright); margin: 0; letter-spacing: 0.02em; }
.header-text p  { font-size: 0.7rem; color: var(–text-mid); margin: 0; font-family: ‘DM Mono’, monospace; letter-spacing: 0.05em; }

.tabs { display: flex; gap: 4px; }
.tab-btn {
flex: 1; padding: 11px 8px; border: none; background: none; cursor: pointer;
font-family: ‘Sora’, sans-serif; font-weight: 600; font-size: 0.82rem;
color: var(–text-mid); border-bottom: 2px solid transparent;
transition: color 0.2s, border-color 0.2s;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.02em;
}
.tab-btn.active { color: var(–tiffany-deep); border-bottom-color: var(–tiffany); }

/* ── Panels ── */
.panel { display: none; padding: 16px; background: var(–bg-mid); }
.panel.active { display: block; }

/* ── Field label ── */
.field-label {
font-size: 0.7rem; color: var(–text-mid); margin-bottom: 5px;
display: block; font-weight: 600; text-transform: uppercase;
letter-spacing: 0.08em; font-family: ‘DM Mono’, monospace;
}

/* ── Inputs ── */
input[type=“date”], input[type=“number”], select {
width: 100%; max-width: 100%; padding: 9px 11px;
border: 1.5px solid var(–border-dim); border-radius: 10px;
font-size: 0.88rem; font-family: ‘DM Mono’, monospace;
color: var(–text-bright); background: var(–bg-input);
-webkit-appearance: none; appearance: none;
transition: border-color 0.2s, box-shadow 0.2s; color-scheme: light;
}
input[type=“date”]:focus, input[type=“number”]:focus, select:focus {
outline: none; border-color: var(–tiffany);
box-shadow: 0 0 0 3px rgba(10,186,181,0.18);
}
input[type=“number”]::-webkit-inner-spin-button { opacity: 1; }
.select-wrap { position: relative; }
.select-wrap::after {
content: “▾”; position: absolute; right: 11px; top: 50%;
transform: translateY(-50%); pointer-events: none;
color: var(–tiffany-deep); font-size: 0.85rem;
}

/* ── Date input row ── */
.date-row {
display: grid; grid-template-columns: 1fr 1fr;
gap: 10px; margin-bottom: 12px; width: 100%;
}

/* ── 月曆容器 ── */
.cal-wrap {
background: var(–bg-section);
border-radius: 16px; border: 1px solid var(–border-dim);
padding: 12px; margin-bottom: 12px; overflow: hidden;
}

/* 月曆導航列 */
.cal-nav {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 10px;
}
.cal-nav-title {
font-size: 0.88rem; font-weight: 700; color: var(–text-bright);
font-family: ‘DM Mono’, monospace; letter-spacing: 0.04em;
text-align: center; flex: 1;
}
.cal-nav-btn {
width: 30px; height: 30px; border: none;
background: var(–bg-section); border-radius: 8px;
color: var(–tiffany); font-size: 1rem;
cursor: pointer; display: flex; align-items: center; justify-content: center;
flex-shrink: 0; transition: background 0.15s;
}
.cal-nav-btn:hover { background: rgba(10,186,181,0.18); }

/* 星期標題列 */
.cal-weekdays {
display: grid; grid-template-columns: repeat(7, 1fr);
margin-bottom: 4px;
}
.cal-wday {
text-align: center; font-size: 0.65rem;
font-family: ‘DM Mono’, monospace; font-weight: 500;
padding: 4px 0; letter-spacing: 0.06em;
}
.cal-wday.mon,.cal-wday.tue,.cal-wday.wed,.cal-wday.thu,.cal-wday.fri { color: var(–text-mid); }
.cal-wday.sat { color: var(–accent-cyan); }
.cal-wday.sun { color: var(–accent-rose); }

/* 日期格子 */
.cal-grid {
display: grid; grid-template-columns: repeat(7, 1fr);
gap: 2px;
}
.cal-day {
aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
font-size: 0.78rem; border-radius: 8px; cursor: pointer;
font-family: ‘DM Mono’, monospace; font-weight: 500;
color: var(–text-mid); position: relative;
transition: background 0.12s, color 0.12s;
user-select: none;
}
.cal-day:hover:not(.empty):not(.other-month) {
background: rgba(10,186,181,0.15);
color: var(–tiffany-deep);
}
.cal-day.other-month { color: var(–text-dim); opacity: 0.45; cursor: default; }
.cal-day.empty { cursor: default; }
.cal-day.today::after {
content: ‘’; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
width: 4px; height: 4px; border-radius: 50%; background: var(–tiffany);
}

/* Panel 1 月曆選取狀態 */
.cal-day.is-start {
background: var(–tiffany) !important;
color: #ffffff !important; font-weight: 800;
border-radius: 8px 0 0 8px;
}
.cal-day.is-end {
background: var(–tiffany-deep) !important;
color: #ffffff !important; font-weight: 800;
border-radius: 0 8px 8px 0;
}
.cal-day.is-start.is-end { border-radius: 8px !important; }
.cal-day.in-range {
background: rgba(10,186,181,0.15);
color: var(–tiffany-deep);
border-radius: 0;
}
/* 工作日在範圍內的標記（底部小點） */
.cal-day.in-range.is-workday::after,
.cal-day.is-start.is-workday::after,
.cal-day.is-end.is-workday::after { display: none; }
.cal-day.in-range.is-workday {
background: rgba(132,204,22,0.14);
color: var(–accent-lime);
}

/* 星期六、日顏色 */
.cal-day.day-sat:not(.is-start):not(.is-end):not(.in-range) { color: var(–accent-cyan); opacity: 0.75; }
.cal-day.day-sun:not(.is-start):not(.is-end):not(.in-range) { color: var(–accent-rose); opacity: 0.75; }

/* Panel 2 月曆選取狀態 */
.cal-day.is-base {
background: var(–accent-violet) !important;
color: #fff !important; font-weight: 800; border-radius: 8px;
}
.cal-day.is-result {
background: rgba(196,181,253,0.2) !important;
color: #c4b5fd !important; font-weight: 700; border-radius: 8px;
box-shadow: inset 0 0 0 1.5px rgba(196,181,253,0.5);
}

/* ── 圖例 ── */
.cal-legend {
display: flex; flex-wrap: wrap; gap: 8px;
margin-top: 10px; padding-top: 10px;
border-top: 1px solid var(–border-dim);
}
.legend-item {
display: flex; align-items: center; gap: 5px;
font-size: 0.65rem; font-family: ‘DM Mono’, monospace;
color: var(–text-mid); white-space: nowrap;
}
.legend-dot {
width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
}

/* ── 工作日勾選區 ── */
.workday-box {
background: var(–bg-section); padding: 12px; border-radius: 14px;
margin-bottom: 12px; border: 1px solid var(–border-dim); width: 100%; overflow: hidden;
}
.workday-title {
font-size: 0.7rem; color: var(–text-mid); margin-bottom: 8px; display: block;
font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; font-family: ‘DM Mono’, monospace;
}
.check-grid {
display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%;
}
.check-item {
display: flex !important; flex-direction: column; align-items: center; justify-content: center;
font-size: 0.72rem; cursor: pointer; background: var(–bg-card); padding: 6px 2px;
border-radius: 8px; border: 1.5px solid var(–border-dim);
user-select: none; font-weight: 600; color: var(–text-mid);
margin-bottom: 0; overflow: hidden; white-space: nowrap;
transition: border-color 0.15s, color 0.15s, background 0.15s;
font-family: ‘Sora’, sans-serif; gap: 3px;
}
.check-item input[type=“checkbox”] { display: none; }
.check-item .ck-dot {
width: 8px; height: 8px; border-radius: 50%;
background: var(–text-dim); transition: background 0.15s;
}
.check-item:has(input:checked) { background: rgba(10,186,181,0.12); border-color: rgba(10,186,181,0.5); color: var(–tiffany-deep); }
.check-item:has(input:checked) .ck-dot { background: var(–tiffany); }
.check-item.sat:has(input:checked) { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.5); color: var(–accent-cyan); }
.check-item.sat:has(input:checked) .ck-dot { background: var(–accent-cyan); }
.check-item.sun:has(input:checked) { background: rgba(244,63,94,0.08); border-color: rgba(244,63,94,0.5); color: var(–accent-rose); }
.check-item.sun:has(input:checked) .ck-dot { background: var(–accent-rose); }

/* ── 結果卡片 ── */
.res-display {
text-align: center; padding: 16px 12px; border-radius: 14px;
margin-bottom: 10px; border: 1px solid var(–border-dim);
width: 100%; overflow: hidden; position: relative;
}
.res-total { background: var(–grad-total); border-color: rgba(10,186,181,0.3); }
.res-total::before { content:’’; position:absolute; left:0;top:0;bottom:0;width:3px; background:linear-gradient(180deg,var(–tiffany),var(–tiffany-deep)); border-radius:14px 0 0 14px; }
.res-work  { background: var(–grad-work);  border-color: rgba(132,204,22,0.2); }
.res-work::before  { content:’’; position:absolute; left:0;top:0;bottom:0;width:3px; background:linear-gradient(180deg,var(–accent-lime),#22c55e); border-radius:14px 0 0 14px; }
.res-date  { background: var(–grad-date);  border-color: rgba(124,92,191,0.3); }
.res-date::before  { content:’’; position:absolute; left:0;top:0;bottom:0;width:3px; background:linear-gradient(180deg,var(–accent-violet),var(–tiffany)); border-radius:14px 0 0 14px; }

.res-display small {
display: block; font-size: 0.68rem; font-family: ‘DM Mono’, monospace;
text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;
}
.res-total small { color: var(–tiffany-deep); }
.res-work  small { color: var(–accent-lime); }
.res-date  small { color: #b794f4; }

.big-val {
font-size: 2.2rem; font-weight: 800; display: block;
word-break: break-word; line-height: 1.1; font-family: ‘DM Mono’, monospace;
}
.res-total .big-val { color: var(–tiffany-deep); text-shadow: 0 0 12px rgba(10,186,181,0.35); }
.res-work  .big-val { color: var(–accent-lime);  text-shadow: 0 0 12px rgba(58,181,106,0.3); }
.res-date  .big-val { color: var(–accent-violet); text-shadow: 0 0 12px rgba(108,99,184,0.3); font-size: 1.3rem; line-height: 1.4; }

/* ── P2 雙欄 ── */
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; width: 100%; }

/* ── 月曆區段標籤 ── */
.cal-section-label {
font-size: 0.72rem; font-family: ‘DM Mono’, monospace;
font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
color: var(–text-mid); margin-bottom: 6px; margin-top: 4px;
}
#p2r-wrap .cal-nav { justify-content: center; }
#p2r-wrap { position: relative; }
#p2r-wrap::before {
content: ‘’; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
background: linear-gradient(180deg, var(–tiffany), var(–tiffany-deep));
border-radius: 16px 0 0 16px;
}

/* ── 選取提示 ── */
.pick-hint {
text-align: center; font-size: 0.72rem; font-family: ‘DM Mono’, monospace;
color: var(–tiffany-deep); margin-bottom: 8px; letter-spacing: 0.04em;
min-height: 18px;
}

@media (max-width: 400px) {
body { padding: 8px; }
.panel { padding: 12px; }
.date-row { grid-template-columns: 1fr; }
.row2 { grid-template-columns: 1fr; }
.big-val { font-size: 1.9rem; }
.res-date .big-val { font-size: 1.15rem; }
.check-grid { grid-template-columns: repeat(7,1fr); }
}
</style>

// ════════════════════════════════
//  共用工具
// ════════════════════════════════
function toLocal(dateStr) {
    // "YYYY-MM-DD" → Date (local midnight)
    if (!dateStr) return null;
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d);
}
function toStr(date) {
    if (!date) return '';
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}
function getTodayLocal() {
    const d = new Date();
    return toStr(d);
}
function sameDay(a, b) {
    if (!a || !b) return false;
    return a.getFullYear() === b.getFullYear() &&
           a.getMonth()    === b.getMonth()    &&
           a.getDate()     === b.getDate();
}

const todayStr = getTodayLocal();
const todayDate = toLocal(todayStr);

// ════════════════════════════════
//  Panel 1 狀態
// ════════════════════════════════
let p1ViewYear  = todayDate.getFullYear();
let p1ViewMonth = todayDate.getMonth(); // 0-based
let p1PickStep  = 0; // 0=選起, 1=選迄
let p1Start     = toLocal(todayStr);
let p1End       = toLocal(todayStr);

const p1StartInput = document.getElementById('start-date');
const p1EndInput   = document.getElementById('end-date');
p1StartInput.value = todayStr;
p1EndInput.value   = todayStr;

// 取得勾選的工作日
function getWorkdays() {
    return Array.from(document.querySelectorAll('#weekday-group input:checked'))
                .map(cb => parseInt(cb.value));
}

// 計算並更新結果
function calcP1() {
    if (!p1Start || !p1End) return;
    let dS = p1Start, dE = p1End;
    if (dS > dE) [dS, dE] = [dE, dS];

    const totalDays = Math.floor((dE - dS) / 86400000) + 1;
    document.getElementById('out-total').textContent = totalDays + ' 天';

    const wdays = getWorkdays();
    let work = 0;
    const cur = new Date(dS);
    for (let i = 0; i < totalDays; i++) {
        if (wdays.includes(cur.getDay())) work++;
        cur.setDate(cur.getDate() + 1);
    }
    document.getElementById('out-work').textContent = work + ' 天';
}

// 繪製 P1 月曆
function renderP1Cal() {
    const grid  = document.getElementById('p1-cal-grid');
    const title = document.getElementById('p1-month-title');
    const y = p1ViewYear, m = p1ViewMonth;

    title.textContent = `${y} 年 ${m + 1} 月`;
    grid.innerHTML = '';

    const firstDay = new Date(y, m, 1);
    const lastDay  = new Date(y, m + 1, 0);

    // 月曆起始星期一對齊 (ISO: 1=Mon...0=Sun)
    let startWd = firstDay.getDay(); // 0=Sun
    startWd = startWd === 0 ? 6 : startWd - 1; // convert to Mon-based

    const wdays = getWorkdays();
    let dS = p1Start, dE = p1End;
    if (dS && dE && dS > dE) [dS, dE] = [dE, dS];

    // 前補空格
    for (let i = 0; i < startWd; i++) {
        const el = document.createElement('div');
        el.className = 'cal-day empty';
        grid.appendChild(el);
    }

    for (let d = 1; d <= lastDay.getDate(); d++) {
        const date = new Date(y, m, d);
        const wd   = date.getDay(); // 0=Sun,6=Sat
        const el   = document.createElement('div');
        el.textContent = d;
        el.className   = 'cal-day';

        // 星期色
        if (wd === 6) el.classList.add('day-sat');
        if (wd === 0) el.classList.add('day-sun');

        // 今天
        if (sameDay(date, todayDate)) el.classList.add('today');

        // 範圍標示
        if (dS && dE) {
            const isWorkday = wdays.includes(wd);
            if (sameDay(date, dS)) el.classList.add('is-start');
            else if (sameDay(date, dE)) el.classList.add('is-end');
            else if (date > dS && date < dE) {
                el.classList.add('in-range');
                if (isWorkday) el.classList.add('is-workday');
            }
        } else if (dS && sameDay(date, dS)) {
            el.classList.add('is-start', 'is-end');
        }

        el.addEventListener('click', () => onP1DayClick(y, m, d));
        grid.appendChild(el);
    }
}

function onP1DayClick(y, m, d) {
    const clicked = new Date(y, m, d);
    const hint = document.getElementById('p1-hint');

    if (p1PickStep === 0) {
        p1Start = clicked;
        p1End   = null;
        p1PickStep = 1;
        hint.textContent = '✓ 已設定開始日 · 請點選結束日';
        p1StartInput.value = toStr(clicked);
        p1EndInput.value   = '';
    } else {
        // 若點的比開始早，交換
        if (clicked < p1Start) {
            p1End   = p1Start;
            p1Start = clicked;
        } else {
            p1End = clicked;
        }
        p1PickStep = 0;
        hint.textContent = `✓ ${toStr(p1Start)} → ${toStr(p1End)}　點擊可重新選取`;
        p1StartInput.value = toStr(p1Start);
        p1EndInput.value   = toStr(p1End);
        calcP1();
    }
    renderP1Cal();
}

// P1 input 手動輸入同步月曆
p1StartInput.addEventListener('change', () => {
    const d = toLocal(p1StartInput.value);
    if (d) { p1Start = d; p1ViewYear = d.getFullYear(); p1ViewMonth = d.getMonth(); }
    if (p1Start && p1End) calcP1();
    renderP1Cal();
});
p1EndInput.addEventListener('change', () => {
    const d = toLocal(p1EndInput.value);
    if (d) { p1End = d; }
    if (p1Start && p1End) calcP1();
    renderP1Cal();
});

document.querySelectorAll('#weekday-group input').forEach(cb => {
    cb.addEventListener('change', () => { calcP1(); renderP1Cal(); });
});

document.getElementById('p1-prev').addEventListener('click', () => {
    p1ViewMonth--;
    if (p1ViewMonth < 0) { p1ViewMonth = 11; p1ViewYear--; }
    renderP1Cal();
});
document.getElementById('p1-next').addEventListener('click', () => {
    p1ViewMonth++;
    if (p1ViewMonth > 11) { p1ViewMonth = 0; p1ViewYear++; }
    renderP1Cal();
});

// ════════════════════════════════
//  Panel 2 狀態
// ════════════════════════════════
let p2ViewYear  = todayDate.getFullYear();
let p2ViewMonth = todayDate.getMonth();
let p2Base      = toLocal(todayStr);
let p2Result    = null;

const p2BaseInput = document.getElementById('base-date');
p2BaseInput.value = todayStr;

function calcP2() {
    const mode = document.getElementById('calc-mode').value;
    const num  = Math.abs(parseInt(document.getElementById('calc-num').value) || 0);
    if (!p2Base) return;
    const d = new Date(p2Base);
    d.setDate(d.getDate() + (mode === 'add' ? num : -num));
    p2Result = d;

    const opts = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long' };
    document.getElementById('out-date').textContent = d.toLocaleDateString('zh-TW', opts);

    // 更新提示文字
    const sameMonth = p2Base.getFullYear() === p2Result.getFullYear() &&
                      p2Base.getMonth()    === p2Result.getMonth();
    document.getElementById('p2-hint').textContent =
        `✓ 基準日：${toStr(p2Base)}　→　結果：${toStr(p2Result)}`;

    // 若同月，結果月曆隱藏；不同月，顯示並跳到結果月
    const wrapEl  = document.getElementById('p2r-wrap');
    const labelEl = document.getElementById('p2r-label');
    if (sameMonth) {
        wrapEl.style.display  = 'none';
        labelEl.style.display = 'none';
    } else {
        wrapEl.style.display  = '';
        labelEl.style.display = '';
        renderP2ResultCal();
    }

    renderP2Cal();
}

// 基準月月曆
function renderP2Cal() {
    const grid  = document.getElementById('p2-cal-grid');
    const title = document.getElementById('p2-month-title');
    const y = p2ViewYear, m = p2ViewMonth;

    title.textContent = `${y} 年 ${m + 1} 月`;
    grid.innerHTML = '';

    const firstDay = new Date(y, m, 1);
    const lastDay  = new Date(y, m + 1, 0);
    let startWd = firstDay.getDay();
    startWd = startWd === 0 ? 6 : startWd - 1;

    for (let i = 0; i < startWd; i++) {
        const el = document.createElement('div');
        el.className = 'cal-day empty';
        grid.appendChild(el);
    }

    for (let d = 1; d <= lastDay.getDate(); d++) {
        const date = new Date(y, m, d);
        const wd   = date.getDay();
        const el   = document.createElement('div');
        el.textContent = d;
        el.className   = 'cal-day';

        if (wd === 6) el.classList.add('day-sat');
        if (wd === 0) el.classList.add('day-sun');
        if (sameDay(date, todayDate)) el.classList.add('today');
        if (p2Base   && sameDay(date, p2Base))   el.classList.add('is-base');
        // 若結果日同月也在這裡標示
        if (p2Result && sameDay(date, p2Result))  el.classList.add('is-result');

        el.addEventListener('click', () => {
            p2Base = new Date(y, m, d);
            p2ViewYear  = p2Base.getFullYear();
            p2ViewMonth = p2Base.getMonth();
            p2BaseInput.value = toStr(p2Base);
            calcP2();
        });
        grid.appendChild(el);
    }
}

// 結果月月曆（只顯示，不可點擊選取）
function renderP2ResultCal() {
    if (!p2Result) return;
    const grid  = document.getElementById('p2r-cal-grid');
    const title = document.getElementById('p2r-month-title');
    const y = p2Result.getFullYear(), m = p2Result.getMonth();

    title.textContent = `${y} 年 ${m + 1} 月`;
    grid.innerHTML = '';

    const firstDay = new Date(y, m, 1);
    const lastDay  = new Date(y, m + 1, 0);
    let startWd = firstDay.getDay();
    startWd = startWd === 0 ? 6 : startWd - 1;

    for (let i = 0; i < startWd; i++) {
        const el = document.createElement('div');
        el.className = 'cal-day empty';
        grid.appendChild(el);
    }

    for (let d = 1; d <= lastDay.getDate(); d++) {
        const date = new Date(y, m, d);
        const wd   = date.getDay();
        const el   = document.createElement('div');
        el.textContent = d;
        el.className   = 'cal-day';

        if (wd === 6) el.classList.add('day-sat');
        if (wd === 0) el.classList.add('day-sun');
        if (sameDay(date, todayDate)) el.classList.add('today');
        if (p2Base   && sameDay(date, p2Base))   el.classList.add('is-base');
        if (p2Result && sameDay(date, p2Result))  el.classList.add('is-result');

        // 結果月曆不允許點擊選取基準日
        el.style.cursor = 'default';
        grid.appendChild(el);
    }
}

p2BaseInput.addEventListener('change', () => {
    const d = toLocal(p2BaseInput.value);
    if (d) {
        p2Base = d;
        p2ViewYear  = d.getFullYear();
        p2ViewMonth = d.getMonth();
    }
    calcP2();
});
['calc-mode', 'calc-num'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input',  calcP2);
    el.addEventListener('change', calcP2);
});

document.getElementById('p2-prev').addEventListener('click', () => {
    p2ViewMonth--;
    if (p2ViewMonth < 0) { p2ViewMonth = 11; p2ViewYear--; }
    renderP2Cal();
});
document.getElementById('p2-next').addEventListener('click', () => {
    p2ViewMonth++;
    if (p2ViewMonth > 11) { p2ViewMonth = 0; p2ViewYear++; }
    renderP2Cal();
});

// ════════════════════════════════
//  分頁切換
// ════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn, .panel').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.target).classList.add('active');
    });
});

// ── 初始化 ──
renderP1Cal();
calcP1();
// P2 初始化：先隱藏結果月曆，calcP2 會決定是否顯示
document.getElementById('p2r-wrap').style.display  = 'none';
document.getElementById('p2r-label').style.display = 'none';
renderP2Cal();
calcP2();
</script>

</body>
</html>
